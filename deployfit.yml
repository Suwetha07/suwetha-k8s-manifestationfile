apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-deployment
  namespace: suwetha-ns
  labels:
    app: flower
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  selector: 
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
        - name: fit-conatiner
          image: muralisocial123/kyndrl-flower-app:v1.1.0
          ports:
            - containerPort: 3015